# MVP Condos — Supabase local config
# Link to your project: supabase link --project-ref <ref>

project_id = "mvp-condos-portal"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[functions.provision-user]
verify_jwt = true

[functions.onboarding-lookup]
verify_jwt = false

[functions.onboarding-register]
verify_jwt = false

[functions.qbo-oauth-callback]
verify_jwt = false

[functions.qbo-oauth-start]
verify_jwt = true

[functions.qbo-sync]
verify_jwt = true

[functions.qbo-disconnect]
verify_jwt = true

[functions.send-portal-email]
verify_jwt = true

[functions.extract-vendor-document]
verify_jwt = true

[functions.vendor-compliance-reminders]
verify_jwt = false
